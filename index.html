<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>SwipeHire</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: white;
            border-bottom: 1px solid #e0e0e0;
            padding: 16px 24px;
        }

        .logo { font-size: 22px; font-weight: 700; color: #2563eb; }
        .logo span { color: #f97316; }

        /* JD Phase */
        #jd-phase {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px 24px;
        }

        .jd-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .jd-card h2 { font-size: 24px; color: #111; margin-bottom: 8px; }
        .jd-card p { color: #666; margin-bottom: 24px; }

        textarea {
            width: 100%;
            height: 200px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 16px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }
        textarea:focus { border-color: #2563eb; }

        .btn-primary {
            margin-top: 16px;
            width: 100%;
            background: #2563eb;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-primary:disabled { background: #93afd4; cursor: not-allowed; }

        .upload-area {
            margin-top: 16px;
            border: 2px dashed #e0e0e0;
            border-radius: 10px;
            padding: 18px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }
        .upload-area:hover { border-color: #2563eb; background: #f0f5ff; }
        .upload-area.loaded { border-color: #22c55e; background: #f0fdf4; border-style: solid; }
        .upload-label { cursor: pointer; font-size: 14px; color: #666; }
        .upload-label strong { color: #2563eb; }
        .upload-area.loaded .upload-label strong { color: #16a34a; }
        .upload-hint { font-size: 12px; color: #aaa; margin-top: 4px; }

        .candidate-reasoning {
            font-size: 12px;
            color: #666;
            font-style: italic;
            margin-bottom: 10px;
            line-height: 1.5;
        }

        /* Swipe Phase */
        #swipe-phase {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 24px;
        }

        .progress-bar {
            width: 100%;
            max-width: 440px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .progress-text { font-size: 13px; color: #666; white-space: nowrap; }

        .progress-track {
            flex: 1;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
        }

        .progress-fill {
            height: 100%;
            background: #2563eb;
            border-radius: 2px;
            transition: width 0.3s;
        }

        .card-stack {
            position: relative;
            width: 100%;
            max-width: 440px;
            height: 500px;
        }

        .candidate-card {
            position: absolute;
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 20px;
            padding: 26px 28px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            transition: transform 0.45s ease, opacity 0.45s ease;
            overflow-y: auto;
        }

        .candidate-card.swipe-right {
            transform: translateX(160%) rotate(20deg) !important;
            opacity: 0;
        }
        .candidate-card.swipe-left {
            transform: translateX(-160%) rotate(-20deg) !important;
            opacity: 0;
        }

        .swipe-hint {
            position: absolute;
            top: 24px;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 800;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s;
        }
        .hint-save { right: 24px; color: #16a34a; border: 3px solid #16a34a; transform: rotate(12deg); }
        .hint-pass { left: 24px; color: #dc2626; border: 3px solid #dc2626; transform: rotate(-12deg); }

        .match-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 12px;
        }
        .match-dot { width: 7px; height: 7px; border-radius: 50%; }

        .match-high { background: #f0fdf4; color: #16a34a; }
        .match-high .match-dot { background: #16a34a; }
        .match-medium { background: #fffbeb; color: #d97706; }
        .match-medium .match-dot { background: #d97706; }
        .match-low { background: #fef2f2; color: #dc2626; }
        .match-low .match-dot { background: #dc2626; }

        .candidate-name { font-size: 21px; font-weight: 700; color: #111; margin-bottom: 3px; }
        .candidate-title { font-size: 14px; color: #555; margin-bottom: 2px; }
        .candidate-exp { font-size: 13px; color: #999; margin-bottom: 12px; }

        .divider { height: 1px; background: #f0f0f0; margin: 12px 0; }

        .section-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #aaa;
            margin-bottom: 7px;
        }

        .skills { display: flex; flex-wrap: wrap; gap: 5px; }

        .skill-tag {
            font-size: 11px;
            padding: 3px 9px;
            border-radius: 5px;
        }

        .skill-hard.match { background: #dbeafe; color: #1e40af; font-weight: 600; }

        }

            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 22px;
            display: flex;
            align-items: center;

        .btn-like { background: white; color: #22c55e; border: 2px solid #86efac; width: 68px; height: 68px; font-size: 26px; }

            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 48px 24px;

        .results-header h2 { font-size: 26px; font-weight: 700; color: #111; margin-bottom: 8px; }
        .results-header p { color: #666; }

            display: flex;
            flex-direction: column;
            gap: 12px;

            border-radius: 12px;

            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-restart:hover { background: #1d4ed8; }

        .hidden { display: none !important; }
    </style>
</head>

<header>
    <div class="logo">Swipe<span>Hire</span></div>

<div id="jd-phase">
    <div class="jd-card">
        <h2>Post a Job Description</h2>
        <p>Paste your JD below and we'll rank the best matching candidates for you to review.</p>
        <textarea id="jd-input" placeholder="e.g. We're looking for a Quantitative Analyst with 3+ years at a hedge fund or investment bank. Strong Python and statistical modeling skills required. Bloomberg Terminal experience a plus..."></textarea>
        <div class="upload-area" id="upload-area" onclick="document.getElementById('file-input').click()">
            <input type="file" id="file-input" accept=".pdf,.csv" multiple style="display:none" onchange="handleFiles(event)">
            <div class="upload-label"><strong>Upload resumes</strong> — PDF or CSV</div>
            <div class="upload-hint" id="upload-hint">Optional — uses built-in demo pool if skipped</div>
        </div>
        <button class="btn-primary" onclick="startSwiping()">Find Candidates →</button>
    </div>
</div>

<div id="swipe-phase" class="hidden">
    <div class="progress-bar">
        <span class="progress-text" id="progress-label">1 / 12</span>
        <div class="progress-track">
            <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
        <span class="progress-text" id="saved-count">0 saved</span>
    </div>

    <div class="card-stack" id="card-stack"></div>

    <div class="action-buttons">
        <button class="btn-action btn-pass" onclick="swipe('left')" title="Pass (← key)">✕</button>
        <button class="btn-action btn-like" onclick="swipe('right')" title="Save (→ key)">✓</button>
    </div>
    <div class="key-hint">← Pass &nbsp;&nbsp; Save →</div>
</div>

<div id="results-phase" class="hidden">
    <div class="results-header">
        <h2>Your Shortlist</h2>
        <p id="results-summary"></p>
    </div>
    <div class="saved-list" id="saved-list"></div>
    <button class="btn-restart" onclick="restart()">← Start Over</button>
</div>

const STOPWORDS = new Set([
    'a','an','the','and','or','but','in','on','at','to','for','of','with','is','are','was',
    'were','be','been','being','have','has','had','do','does','did','will','would','could',
    'should','may','might','shall','can','we','i','you','they','he','she','it','this','that',
    'these','those','our','your','their','its','my','his','her','us','them','who','which',
    'what','when','where','how','why','not','no','as','by','from','into','through','about',
    'up','out','over','then','once','more','also','just','than','both','each','few','most',
    'other','same','such','own','so','if','while','after','before','between','looking',
    'years','experience','strong','plus','seeking','ability','excellent','good','work',
    'team','new','well','including','skills','role','join','candidate','responsibilities'
]);

const API = window.location.protocol === 'file:' ? 'http://localhost:5000' : '';

let ranked = [];
let idx = 0;
let saved = [];
let jdTokens = [];
let uploadedResumes = [];  // [{id, text}] from CSV upload

function parseCSV(text) {
    const rows = [];
    let row = [], field = '', inQuotes = false;
    for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        if (inQuotes) {
            if (ch === '"' && text[i + 1] === '"') { field += '"'; i++; }
            else if (ch === '"') { inQuotes = false; }
            else { field += ch; }
        } else {
            if (ch === '"') { inQuotes = true; }
            else if (ch === ',') { row.push(field); field = ''; }
            else if (ch === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
            else if (ch !== '\r') { field += ch; }
        }
    }
    if (field || row.length) { row.push(field); rows.push(row); }
    return rows;
}

function handleFiles(event) {
    const files = Array.from(event.target.files);
    if (!files.length) return;

    const isPDF = files[0].name.toLowerCase().endsWith('.pdf');

    if (isPDF) {
        _handlePDFs(files);
    } else {
        _handleCSV(files[0]);
    }
}

async function _handlePDFs(files) {
    const area = document.getElementById('upload-area');
    document.querySelector('#upload-area .upload-label').innerHTML =
        `<strong>Extracting text from ${files.length} PDF${files.length !== 1 ? 's' : ''}…</strong>`;
    document.getElementById('upload-hint').textContent = '';

    const form = new FormData();
    files.slice(0, 25).forEach(f => form.append('pdfs', f));

    try {
        const res = await fetch(`${API}/extract`, { method: 'POST', body: form });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Extraction failed');

        uploadedResumes = data;
        area.classList.add('loaded');
        document.querySelector('#upload-area .upload-label').innerHTML =
            `<strong>✓ ${uploadedResumes.length} resumes loaded</strong> — ${files.length} PDFs`;
        document.getElementById('upload-hint').textContent =
            files.length > 25 ? 'Capped at 25 resumes per query' : '';
    } catch (err) {
        document.querySelector('#upload-area .upload-label').innerHTML =
            '<strong>Upload resumes</strong> — PDF or CSV';
        document.getElementById('upload-hint').textContent = 'Optional — uses built-in demo pool if skipped';
        alert('PDF extraction failed: ' + err.message);
    }
}

function _handleCSV(file) {
    const reader = new FileReader();
    reader.onload = e => {
        const rows = parseCSV(e.target.result).filter(r => r.some(c => c.trim()));
        if (rows.length < 2) { alert('CSV appears empty or has only one row.'); return; }

        const headers = rows[0].map(h => h.trim().toLowerCase());
        let colIdx = headers.findIndex(h => ['resume', 'text', 'content', 'cv', 'description'].includes(h));
        if (colIdx === -1) {
            const avgs = headers.map((_, ci) =>
                rows.slice(1).reduce((s, r) => s + (r[ci] || '').length, 0) / (rows.length - 1)
            );
            colIdx = avgs.indexOf(Math.max(...avgs));
        }

        uploadedResumes = rows.slice(1)
            .map((r, i) => ({ id: i + 1, text: (r[colIdx] || '').trim() }))
            .filter(r => r.text.length > 50)
            .slice(0, 25);

        const area = document.getElementById('upload-area');
        area.classList.add('loaded');
        document.querySelector('#upload-area .upload-label').innerHTML =
            `<strong>✓ ${uploadedResumes.length} resumes loaded</strong> — ${file.name}`;
        document.getElementById('upload-hint').textContent =
            uploadedResumes.length === 25 ? 'Capped at 25 resumes per query' : '';
    };
    reader.readAsText(file);
}

function tokenize(text) {
    return text.toLowerCase()
        .split(/[\s,.()\-\/\+#:;!?]+/)
        .filter(w => w.length > 2 && !STOPWORDS.has(w));
}

function matchClass(score) {
    if (score >= 75) return 'match-high';
    if (score >= 50) return 'match-medium';
    return 'match-low';
}

function matchLabel(score) {
    if (score >= 75) return 'Strong Match';
    if (score >= 50) return 'Good Match';
    return 'Partial Match';
}

function isMatch(skill) {
    const s = skill.toLowerCase();
    return jdTokens.some(t => s.includes(t) || t.includes(s));
}

async function startSwiping() {
    const jd = document.getElementById('jd-input').value.trim();
    if (!jd) { alert('Please enter a job description first.'); return; }

    const btn = document.querySelector('#jd-phase .btn-primary');
    btn.textContent = 'Analyzing with AI…';
    btn.disabled = true;

    jdTokens = tokenize(jd);

    try {
        if (uploadedResumes.length > 0) {
            // Real resume flow: Claude extracts structure + scores in one pass
            const res = await fetch(`${API}/rank-resumes`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ jd, resumes: uploadedResumes })
            });
            if (!res.ok) throw new Error('Server returned ' + res.status);
            const data = await res.json();
            if (data.error) throw new Error(data.error);
            ranked = data;
        } else {
            // Demo flow: hardcoded candidates, Claude scores only
            const payload = CANDIDATES.map(c => ({
                id: c.id, name: c.name, title: c.title, experience: c.experience,
                bio: c.bio, skills: c.skills
            }));
            const res = await fetch(`${API}/rank`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ jd, candidates: payload })
            });
            if (!res.ok) throw new Error('Server returned ' + res.status);
            const scores = await res.json();
            if (scores.error) throw new Error(scores.error);

            const scoreMap = Object.fromEntries(scores.map(s => [s.id, s]));
            ranked = CANDIDATES.map(c => ({
                ...c,
                score: scoreMap[c.id]?.score ?? 0,
                reasoning: scoreMap[c.id]?.reasoning ?? ''
            })).sort((a, b) => b.score - a.score);
        }
    } catch (err) {
        btn.textContent = 'Find Candidates →';
        btn.disabled = false;
        alert('Could not reach the ranking server.\nMake sure server.py is running:\n  python server.py\n\nError: ' + err.message);
        return;
    }

    idx = 0;
    saved = [];
    btn.textContent = 'Find Candidates →';
    btn.disabled = false;

    document.getElementById('jd-phase').classList.add('hidden');
    document.getElementById('swipe-phase').classList.remove('hidden');
    renderCard();
    updateProgress();
}

function renderCard() {
    const stack = document.getElementById('card-stack');
    stack.innerHTML = '';

    if (idx >= ranked.length) { showResults(); return; }

    const c = ranked[idx];
    const cls = matchClass(c.score);
    const lbl = matchLabel(c.score);

    const hardHTML = c.skills.hard.map(s =>
        `<span class="skill-tag skill-hard ${isMatch(s) ? 'match' : ''}">${s}</span>`
    ).join('');

    const toolsHTML = c.skills.tools.map(s =>
        `<span class="skill-tag skill-tool ${isMatch(s) ? 'match' : ''}">${s}</span>`
    ).join('');

    const card = document.createElement('div');
    card.className = 'candidate-card';
    card.id = 'current-card';
    card.innerHTML = `
        <span class="swipe-hint hint-pass">PASS</span>
        <span class="swipe-hint hint-save">SAVE</span>
        <div class="match-badge ${cls}">
            <div class="match-dot"></div>${lbl} &middot; ${c.score}%
        </div>
        ${c.reasoning ? `<div class="candidate-reasoning">${c.reasoning}</div>` : ''}
        <div class="candidate-name">${c.name}</div>
        <div class="candidate-title">${c.title}</div>
        <div class="candidate-exp">${c.experience} experience</div>
        <div class="divider"></div>
        <div class="section-label">Hard Skills</div>
        <div class="skills">${hardHTML}</div>
        <div class="section-label" style="margin-top:10px;">Tools</div>
        <div class="skills">${toolsHTML}</div>
        <div class="soft-skills-line"><strong style="color:#bbb;font-size:10px;text-transform:uppercase;letter-spacing:.06em;">Soft&nbsp;</strong>${c.skills.soft.join(' · ')}</div>
        <div class="divider"></div>
        <div class="section-label">About</div>
        <div class="candidate-bio">${c.bio}</div>
    `;
    stack.appendChild(card);
}

function swipe(dir) {
    const card = document.getElementById('current-card');
    if (!card) return;

    if (dir === 'right') {
        card.classList.add('swipe-right');
        saved.push(ranked[idx]);
    } else {
        card.classList.add('swipe-left');
    }
    idx++;
    updateProgress();
    setTimeout(renderCard, 420);
}

function updateProgress() {
    const total = ranked.length;
    document.getElementById('progress-label').textContent = `${Math.min(idx + 1, total)} / ${total}`;
    document.getElementById('progress-fill').style.width = `${(idx / total) * 100}%`;
    document.getElementById('saved-count').textContent = `${saved.length} saved`;
}

function showResults() {
    document.getElementById('swipe-phase').classList.add('hidden');
    document.getElementById('results-phase').classList.remove('hidden');

    document.getElementById('results-summary').textContent = saved.length > 0
        ? `You shortlisted ${saved.length} candidate${saved.length !== 1 ? 's' : ''} out of ${ranked.length}.`
        : `You passed on all ${ranked.length} candidates.`;

    const list = document.getElementById('saved-list');
    if (saved.length === 0) {
        list.innerHTML = `<div class="empty-state"><div class="big">🤔</div><p>No candidates saved. Try a broader JD next time.</p></div>`;
        return;
    }

    list.innerHTML = saved.map(c => `
        <div class="saved-card">
            <div class="saved-info">
                <h3>${c.name}</h3>
                <p>${c.title} &middot; ${c.experience}</p>
                <div class="saved-skills">${c.skills.hard.slice(0, 4).join(' · ')}</div>
            </div>
            <div class="saved-pct">${c.score}% match</div>
        </div>
    `).join('');
}

function restart() {
    saved = [];
    ranked = [];
    idx = 0;
    uploadedResumes = [];
    document.getElementById('results-phase').classList.add('hidden');
    document.getElementById('jd-phase').classList.remove('hidden');
    document.getElementById('jd-input').value = '';
    document.getElementById('file-input').value = '';
    const area = document.getElementById('upload-area');
    area.classList.remove('loaded');
    area.querySelector('.upload-label').innerHTML = '<strong>Upload resumes</strong> — PDF or CSV';
    document.getElementById('upload-hint').textContent = 'Optional — uses built-in demo pool if skipped';
}

document.addEventListener('keydown', e => {
    if (document.getElementById('swipe-phase').classList.contains('hidden')) return;
    if (e.key === 'ArrowLeft') swipe('left');
    if (e.key === 'ArrowRight') swipe('right');
});
</script>
</body>
</html>
