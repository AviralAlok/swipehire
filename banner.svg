<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg)" rx="12"/>

  <!-- Decorative card shapes -->
  <rect x="580" y="-20" width="110" height="150" rx="14" fill="white" fill-opacity="0.06" transform="rotate(15 635 55)"/>
  <rect x="640" y="10" width="110" height="150" rx="14" fill="white" fill-opacity="0.06" transform="rotate(8 695 85)"/>
  <rect x="670" y="30" width="110" height="150" rx="14" fill="white" fill-opacity="0.10" transform="rotate(2 725 105)"/>

  <!-- Swipe arrows -->
  <text x="555" y="115" font-size="38" fill="#ef4444" fill-opacity="0.7" font-family="sans-serif">✕</text>
  <text x="720" y="115" font-size="38" fill="#22c55e" fill-opacity="0.7" font-family="sans-serif">✓</text>

  <!-- Logo text -->
  <text x="60" y="105" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="52" font-weight="700" fill="white">Swipe</text>
  <text x="233" y="105" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="52" font-weight="700" fill="#f97316">Hire</text>

  <!-- Tagline -->
  <text x="60" y="140" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" fill="white" fill-opacity="0.75">AI-powered candidate ranking · Tinder-style recruiter workflow</text>

  <!-- Pill badges -->
  <rect x="60" y="155" width="90" height="26" rx="13" fill="white" fill-opacity="0.12"/>
  <text x="105" y="173" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="white">Flask</text>

  <rect x="160" y="155" width="120" height="26" rx="13" fill="white" fill-opacity="0.12"/>
  <text x="220" y="173" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="white">Claude API</text>

  <rect x="290" y="155" width="130" height="26" rx="13" fill="white" fill-opacity="0.12"/>
  <text x="355" y="173" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="white">Prompt Caching</text>

  <rect x="430" y="155" width="100" height="26" rx="13" fill="white" fill-opacity="0.12"/>
  <text x="480" y="173" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="white">Vanilla JS</text>
</svg>
